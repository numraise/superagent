name: Test

on:
  push:
  pull_request:

jobs:
  agent-survival-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run automated tests
        run: node tests/run-agent-survival-tests.js
